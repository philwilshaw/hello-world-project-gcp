substitutions:
  _SERVICE_NAME: hello-world
  _ENVIRONMENT: prod
  _REGION: europe-west1

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --source
      - .
      - --region
      - ${_REGION}
      - --allow-unauthenticated
      - --update-env-vars
      - ENVIRONMENT=${_ENVIRONMENT},DATABASE_BUCKET=${PROJECT_ID}-hello-world-data-prod

options:
  logging: CLOUD_LOGGING_ONLY
